<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELFAWADZ CLOWN</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#000;
color:#fff;
overflow-x:hidden;
min-height:100vh;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at center,
rgba(255,0,0,.15),
transparent 70%);
animation:pulse 4s infinite;
pointer-events:none;
z-index:-1;
}

@keyframes pulse{
0%,100%{opacity:.4;}
50%{opacity:1;}
}

header{
text-align:center;
padding:40px 20px;
}

.logo{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:3px solid red;
box-shadow:0 0 30px red;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
50%{
transform:translateY(-10px);
}
}

h1{
margin-top:20px;
font-size:3rem;
letter-spacing:5px;
color:#ff2222;
text-shadow:0 0 20px red;
}

.subtitle{
margin-top:10px;
color:#bbb;
}

.gallery{
width:90%;
max-width:900px;
margin:30px auto;
position:relative;
overflow:hidden;
border-radius:20px;
box-shadow:0 0 40px rgba(255,0,0,.4);
}

.gallery img{
width:100%;
height:500px;
object-fit:cover;
display:none;
filter:brightness(.7);
}

.gallery img.active{
display:block;
animation:fade 1s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

.quote-box{
width:90%;
max-width:800px;
margin:40px auto;
padding:30px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,0,0,.3);
border-radius:20px;
text-align:center;
}

.quote{
font-size:1.4rem;
line-height:1.8;
color:#fff;
}

.author{
margin-top:15px;
color:#ff4444;
}

.music{
text-align:center;
margin:30px;
}

button{
padding:15px 25px;
margin:10px;
border:none;
border-radius:50px;
cursor:pointer;
font-size:16px;
background:#ff1111;
color:white;
box-shadow:0 0 20px red;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

footer{
text-align:center;
padding:40px;
color:#888;
}

.glitch{
animation:glitch 2s infinite;
}

@keyframes glitch{
0%,100%{
text-shadow:
2px 2px red,
-2px -2px purple;
}
50%{
text-shadow:
-2px 2px red,
2px -2px purple;
}
}
</style>
</head>
<body>

<header>
<img src="clown2.jpeg" class="logo">

<h1 class="glitch">ELFAWADZ CLOWN</h1>

<p class="subtitle">
Welcome To The Dark Side Of Imagination
</p>
</header>

<div class="gallery">
<img src="estetik.jpeg" class="active">
<img src="clown1.jpeg">
<img src="clown3.jpeg">
<img src="eljoker.jpeg">
</div>

<div class="music">
<button onclick="playMusic()">▶ Play Music</button>
<button onclick="pauseMusic()">⏸ Stop Music</button>
<audio id="bgm" src="havenly.mp3"></audio>
</div>

<div class="quote-box">
<div class="quote" id="quote">
"The darkest nights produce the brightest stars."
</div>
<div class="author" id="author">
— Unknown Philosopher
</div>
</div>

<footer>
ELFAWADZ CLOWN © 2026
</footer>

<script>
const slides =
document.querySelectorAll(".gallery img");

let current = 0;

setInterval(()=>{
slides[current].classList.remove("active");

current++;

if(current >= slides.length){
current = 0;
}

slides[current].classList.add("active");
},4000);

function playMusic(){
document.getElementById("bgm").play();
}

function pauseMusic(){
document.getElementById("bgm").pause();
}

const quotes = [
{
text:"The darkest nights produce the brightest stars.",
author:"Unknown Philosopher"
},
{
text:"Your future is created by what you do today, not tomorrow.",
author:"Robert Kiyosaki"
},
{
text:"He who conquers himself is the mightiest warrior.",
author:"Confucius"
},
{
text:"The obstacle is the way.",
author:"Marcus Aurelius"
},
{
text:"A man who masters patience masters everything else.",
author:"George Savile"
},
{
text:"Discipline is choosing between what you want now and what you want most.",
author:"Abraham Lincoln"
}
];

let q = 0;

setInterval(()=>{
q++;

if(q >= quotes.length){
q = 0;
}

document.getElementById("quote").innerText =
quotes[q].text;

document.getElementById("author").innerText =
"— " + quotes[q].author;

},5000);
</script>

</body>
</html>
